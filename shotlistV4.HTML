<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shotlist</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:black;
  --text:white;
  --grid:white;
}

.light{
  --bg:white;
  --text:black;
  --grid:black;
}

body{
  margin:0;
  font-family:'Montserrat', sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
}

.title{
  font-size:60px;
  font-weight:800;
  letter-spacing:2px;
}

.subtitle{
  margin-top:-10px;
  font-size:20px;
}

.info{
  text-align:left;
}

/* PROD BOX */
.prodBox{
  display:flex;
  align-items:center;
  gap:10px;
  border:1px solid var(--grid);
  padding:12px 15px;
  width:300px;
  margin-bottom:10px;
  border-radius:10px;
}

.prodBox span{
  font-weight:600;
  min-width:50px;
}

.prodLine{
  border-bottom:0px solid var(--grid);
  width:220px;
  margin-top : 20px;
  margin-bottom:20px;
}

/* META */
.meta{
  margin-top:6px;
  font-weight:500;
}

.meta span{
  margin-left:10px;
  min-width:120px;
  display:inline-block;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid var(--grid);
  padding:8px;
}

td{
  height:35px;
}

td[contenteditable]{
  cursor:text;
}

.no{
  width:50px;
}

.angle{
  width:200px;
}

.lens{
  width:120px;
}

.status{
  width:80px;
  text-align:center;
  cursor:pointer;
}

/* CONTROLS */
.controls{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  padding:10px 14px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.darkbtn{
  background:white;
  color:black;
}

.light .darkbtn{
  background:black;
  color:white;
}

/* MOBILE */
@media (max-width:700px){
  .title{
    font-size:40px;
  }

  table{
    font-size:14px;
  }
}

/* PRINT */
@media print{
  body{
    background:white;
    color:black;
  }

  table{
    border-collapse:collapse;
  }

  th,td{
    border:1px solid black !important;
  }

  .controls{
    display:none;
  }

  .prodBox{
    border:2px solid black;
  }
}

/* STATUS COLORS */
tr.done{
  background-color:#a8e6a3; /* vert clair */
}

tr.redo{
  background-color:#f9d49d; /* orange clair */
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <div>
      <div class="title">SHOTLIST</div>
      <div class="subtitle">ROLLING SHOT</div>
    </div>

    <div class="info">
      <div class="prodBox">
        <span>PROD :</span>
        <div id="prod" contenteditable="true"></div>
      </div>

      <div class="prodLine"></div>

      <div class="meta">DIRECTOR : <span contenteditable="true" id="director"></span></div>
      <div class="meta">CAMERA : <span contenteditable="true" id="camera"></span></div>
      <div class="meta">DATE : <span contenteditable="true" id="date"></span></div>
    </div>
  </div>

  <table id="shotTable">
    <thead>
      <tr>
        <th class="no">NO</th>
        <th>DESCRIPTION</th>
        <th class="angle">ANGLE</th>
        <th class="lens">LENS</th>
        <th>STATUS</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="controls">
    <button onclick="addRow()">+ Row</button>
    <button onclick="toggleTheme()" class="darkbtn">Dark / Light</button>
    <button onclick="exportPDF()">Export PDF</button>
    <button onclick="resetTable()">Reset</button>
  </div>
</div>

<script>
const table=document.querySelector("#shotTable tbody")

function addRow(){
  let row=table.insertRow()
  let number=table.rows.length
  row.innerHTML=`
    <td>${number}</td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td contenteditable="true"></td>
    <td class="status"></td>
  `
}

// Ajout initial de 17 lignes
for(let i=0;i<17;i++){ addRow() }

// Thème dark/light
function toggleTheme(){
  document.body.classList.toggle("light")
  saveData()
}

// Export PDF
function exportPDF(){
  window.print()
}

// Sauvegarde automatique
function saveData(){
  let data={
    prod:prod.innerText,
    director:director.innerText,
    camera:camera.innerText,
    date:date.innerText,
    theme:document.body.classList.contains("light"),
    rows:[]
  }

  document.querySelectorAll("#shotTable tbody tr").forEach(tr=>{
    let cells=tr.querySelectorAll("td")
    data.rows.push({
      description:cells[1].innerText,
      angle:cells[2].innerText,
      lens:cells[3].innerText,
      status:cells[4].innerText
    })
  })

  localStorage.setItem("shotlist",JSON.stringify(data))
}

// Chargement des données
function loadData(){
  let data=localStorage.getItem("shotlist")
  if(!data) return
  data=JSON.parse(data)

  prod.innerText=data.prod
  director.innerText=data.director
  camera.innerText=data.camera
  date.innerText=data.date

  if(data.theme){
    document.body.classList.add("light")
  }

  data.rows.forEach((row,i)=>{
    if(table.rows[i]){
      table.rows[i].cells[1].innerText=row.description
      table.rows[i].cells[2].innerText=row.angle
      table.rows[i].cells[3].innerText=row.lens
      table.rows[i].cells[4].innerText=row.status

      // Appliquer les classes de couleur selon le status
      if(row.status==="✅") table.rows[i].classList.add("done")
      else if(row.status==="🔄") table.rows[i].classList.add("redo")
    }
  })
}

// Reset complet
function resetTable(){
  localStorage.removeItem("shotlist")
  prod.innerText=""
  director.innerText=""
  camera.innerText=""
  date.innerText=""
  table.innerHTML=""
  for(let i=0;i<17;i++){ addRow() }
}

// Gestion clic sur STATUS
table.addEventListener("click", function(e){
  if(e.target.classList.contains("status")){
    const tr = e.target.closest("tr")
    const current = e.target.innerText
    tr.classList.remove("done","redo")

    if(current==="") {
      e.target.innerText="✅"
      tr.classList.add("done")
    } else if(current==="✅") {
      e.target.innerText="🔄"
      tr.classList.add("redo")
    } else {
      e.target.innerText=""
    }
    saveData()
  }
})

// Sauvegarde dès qu'on modifie un champ
document.addEventListener("input",saveData)

// Charger les données au démarrage
loadData()
</script>

</body>
</html>
